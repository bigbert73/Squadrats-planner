version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: squadrats-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persistent SQLite database — survives container restarts
      - ./data:/app/data
      # Hot-reload: mount source for development
      - ./backend/src:/app/src
      # Serve frontend files from the backend container too
      - ./frontend:/frontend:ro
    environment:
      - NODE_ENV=development
      - DB_PATH=/app/data/squadrats.db
      - PORT=3000
      - BROUTER_URL=http://brouter:17777
    env_file:
      - .env
    depends_on:
      - brouter

  brouter:
    image: abrensch/brouter
    container_name: squadrats-brouter
    restart: unless-stopped
    ports:
      - "17777:17777"
    volumes:
      - ./data/brouter-segments:/brouter-data/segments4
    environment:
      - JAVA_OPTS=-Xmx512m -Xms128m

  # Optional: simple static file server for frontend
  frontend:
    image: nginx:alpine
    container_name: squadrats-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
