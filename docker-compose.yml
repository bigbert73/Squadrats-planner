version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: squadrats-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persistent SQLite database — survives container restarts
      - ./data:/app/data
      # Hot-reload: mount source for development
      - ./backend/src:/app/src
      # Serve frontend files from the backend container too
      - ./frontend:/frontend:ro
    environment:
      - NODE_ENV=development
      - DB_PATH=/app/data/squadrats.db
      - PORT=3000
    env_file:
      - .env

  # Optional: simple static file server for frontend
  frontend:
    image: nginx:alpine
    container_name: squadrats-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
