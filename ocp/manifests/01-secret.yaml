# Strava API credentials.
# 1. Fill in the values below (or use: oc create secret generic squadrats-strava --from-env-file=.env)
# 2. STRAVA_REDIRECT_URI must match your Route URL — check with:
#      oc get route squadrats -n squadrats -o jsonpath='{.spec.host}'
#    then set:  https://<host>/auth/callback
#    and update your Strava app at: https://www.strava.com/settings/api
apiVersion: v1
kind: Secret
metadata:
  name: squadrats-strava
  namespace: squadrats
type: Opaque
stringData:
  # JWT — wygeneruj: node -e "console.log(require('crypto').randomBytes(40).toString('hex'))"
  JWT_SECRET: ""
  COOKIE_SECURE: "true"
  # Admin konto (tylko przy pierwszej migracji z single-user)
  # ADMIN_USERNAME: "admin"
  # ADMIN_PASSWORD: ""
  # Strava — teraz konfigurowane per-user w profilu
  # Zostawione dla wstecznej kompatybilności przy migracji
  STRAVA_CLIENT_ID: ""
  STRAVA_CLIENT_SECRET: ""
  STRAVA_REDIRECT_URI: "https://REPLACE_WITH_ROUTE_HOST/auth/callback"
