# ── PersistentVolumeClaim — BRouter OSM segments (~300 MB for Poland) ────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: brouter-data
  namespace: squadrats
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
# ── Deployment — BRouter routing engine ────────────────────────────────────
# InitContainer downloads OSM segment files for Poland on first start.
# Segments are cached in the PVC — subsequent restarts skip the download.
#
# NOTE: If your OCP enforces runAsNonRoot, grant the anyuid SCC to the
# service account:  oc adm policy add-scc-to-serviceaccount anyuid \
#                     -z default -n squadrats
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squadrats-brouter
  namespace: squadrats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squadrats-brouter
  template:
    metadata:
      labels:
        app: squadrats-brouter
    spec:
      initContainers:
        - name: download-segments
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              set -e
              cd /segments
              for seg in E10_N50 E15_N50 E20_N50 E15_N45 E20_N45; do
                if [ -f "${seg}.rd5" ]; then
                  echo "OK: ${seg}.rd5 already present"
                else
                  echo "Downloading ${seg}.rd5 ..."
                  curl -L -f --retry 3 --retry-delay 5 \
                    -o "${seg}.rd5" \
                    "https://brouter.de/brouter/segments4/${seg}.rd5"
                  echo "Done: ${seg}.rd5"
                fi
              done
          volumeMounts:
            - name: brouter-data
              mountPath: /segments
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 200m
      containers:
        - name: brouter
          image: abrensch/brouter
          ports:
            - containerPort: 17777
          volumeMounts:
            - name: brouter-data
              mountPath: /brouter-data/segments4
          env:
            - name: JAVA_OPTS
              value: "-Xmx512m -Xms128m"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 768Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /brouter?lonlats=21.012,52.229|21.015,52.232&profile=fastbike&alternativeidx=0&format=geojson
              port: 17777
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /brouter?lonlats=21.012,52.229|21.015,52.232&profile=fastbike&alternativeidx=0&format=geojson
              port: 17777
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: brouter-data
          persistentVolumeClaim:
            claimName: brouter-data
---
# ── Service ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: squadrats-brouter
  namespace: squadrats
spec:
  selector:
    app: squadrats-brouter
  ports:
    - port: 17777
      targetPort: 17777
