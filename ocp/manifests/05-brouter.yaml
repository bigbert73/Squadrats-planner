# ── PersistentVolumeClaim — BRouter OSM segments (~300 MB for Poland) ────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: brouter-data
  namespace: squadrats
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
# ── Deployment — BRouter routing engine ────────────────────────────────────
# Segments pre-loaded to PVC via oc cp — no init container needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squadrats-brouter
  namespace: squadrats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: squadrats-brouter
  template:
    metadata:
      labels:
        app: squadrats-brouter
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: brouter
          image: abrensch/brouter
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 17777
          volumeMounts:
            - name: brouter-data
              mountPath: /brouter-data/segments4
          env:
            - name: JAVA_OPTS
              value: "-Xmx512m -Xms128m"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 768Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /brouter?lonlats=21.012,52.229|21.015,52.232&profile=fastbike&alternativeidx=0&format=geojson
              port: 17777
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /brouter?lonlats=21.012,52.229|21.015,52.232&profile=fastbike&alternativeidx=0&format=geojson
              port: 17777
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: brouter-data
          persistentVolumeClaim:
            claimName: brouter-data
---
# ── Service ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: squadrats-brouter
  namespace: squadrats
spec:
  selector:
    app: squadrats-brouter
  ports:
    - port: 17777
      targetPort: 17777
